<!DOCTYPE html>
<html lang="de">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
        <title>Bild Ecken Abrunden</title>
        <style>
            body {
                margin: 0;
                font-family: 'Segoe UI', sans-serif;
                background: linear-gradient(135deg, #1e3c72, #2a5298);
                min-height: 100vh;
                display: flex;
                justify-content: center;
                align-items: center;
            }

            .container {
                width: 420px;
                padding: 30px;
                border-radius: 25px;
                background: rgba(255, 255, 255, 0.15);
                backdrop-filter: blur(15px);
                -webkit-backdrop-filter: blur(15px);
                box-shadow: 0 8px 32px rgba(0,0,0,0.2);
                text-align: center;
                color: white;
                border: 1px solid rgba(255,255,255,0.2);
                animation: fadeIn 0.7s ease;
            }

            h1 {
                margin-bottom: 20px;
                font-size: 28px;
            }

            input[type="file"] {
                margin-top: 10px;
                color: white;
            }

            .label {
                margin-top: 20px;
                font-size: 18px;
                font-weight: bold;
            }

            input[type="range"] {
                width: 100%;
                margin-top: 10px;
                accent-color: #ffffff;
            }

            canvas {
                margin-top: 25px;
                max-width: 100%;
                border: 2px solid rgba(255,255,255,0.3);
                box-shadow: 0 4px 20px rgba(0,0,0,0.3);
                transition: transform 0.3s ease;
            }

            canvas:hover {
                transform: scale(1.02);
            }

            button {
                margin-top: 25px;
                padding: 14px 24px;
                border: none;
                border-radius: 14px;
                background: white;
                color: #024597;
                font-size: 16px;
                font-weight: bold;
                cursor: pointer;
                transition: all 0.3s ease;
            }

            button:hover {
                transform: translateY(-2px);
                background: #f1f1f1;
                box-shadow: 0 6px 15px rgba(0,0,0,0.25);
            }

            @keyframes fadeIn {
                from {
                    opacity: 0;
                    transform: translateY(20px);
                }

                to {
                    opacity: 1;
                    transform: translateY(0);
                }
            }

            .upload-btn {
                display: inline-block;
                margin-top: 15px;
                padding: 14px 24px;
                border-radius: 14px;
                background: linear-gradient(135deg, #4facfe, #00c6ff);
                color: white;
                font-size: 16px;
                font-weight: bold;
                letter-spacing: 0.5px;
                cursor: pointer;
                transition: all 0.3s ease;
                box-shadow: 0 4px 15px rgba(0,0,0,0.25);
                border: 1px solid rgba(255,255,255,0.2);
            }

            .upload-btn:hover {
                transform: translateY(-3px) scale(1.03);
                background: linear-gradient(135deg, #43e97b, #38f9d7);
                box-shadow: 0 8px 20px rgba(0,0,0,0.35);
            }

            .upload-btn:active {
                transform: scale(0.98);
            }
        </style>
    </head>
    <body>
        <div class="container">
            <h1>Bild Ecken Abrunden</h1>
            <label for="upload" class="upload-btn">
                Bild auswählen
            </label>
            <input type="file" id="upload" accept="image/*" hidden>
            <p id="fileName">Kein Bild ausgewählt</p>
            <div class="label">
                Rundung: <span id="radiusValue">30</span>px
            </div>
            <input type="range" id="radius" min="0" max="200" value="30">
            <canvas id="canvas"></canvas>
            <br>
            <button id="downloadBtn">Bild Speichern</button>
        </div>
        <script>
            const upload = document.getElementById("upload");
            const canvas = document.getElementById("canvas");
            const ctx = canvas.getContext("2d");

            const radiusSlider = document.getElementById("radius");
            const radiusValue = document.getElementById("radiusValue");

            const downloadBtn = document.getElementById("downloadBtn");

            let img = new Image();

            let originalFileName = "bild";

            function drawRoundedImage(radius) {
                if (!img.src) return;

                canvas.width = img.width;
                canvas.height = img.height;

                ctx.clearRect(0, 0, canvas.width, canvas.height);

                ctx.save();

                roundedRect(ctx, 0, 0, canvas.width, canvas.height, radius);
                ctx.clip();

                ctx.drawImage(img, 0, 0);

                ctx.restore();
            }

            function roundedRect(ctx, x, y, width, height, radius) {
                ctx.beginPath();
                ctx.moveTo(x + radius, y);

                ctx.lineTo(x + width - radius, y);
                ctx.quadraticCurveTo(x + width, y, x + width, y + radius);

                ctx.lineTo(x + width, y + height - radius);
                ctx.quadraticCurveTo(x + width, y + height, x + width - radius, y + height);

                ctx.lineTo(x + radius, y + height);
                ctx.quadraticCurveTo(x, y + height, x, y + height - radius);

                ctx.lineTo(x, y + radius);
                ctx.quadraticCurveTo(x, y, x + radius, y);

                ctx.closePath();
            }

            upload.addEventListener("change", (e) => {
                const file = e.target.files[0];

                if (!file) return;

                originalFileName = file.name.split('.').slice(0, -1).join('.');

                const reader = new FileReader();

                reader.onload = function(event) {
                img.onload = () => {
                    drawRoundedImage(parseInt(radiusSlider.value));
                };

                img.src = event.target.result;
                };

                reader.readAsDataURL(file);
            });

            radiusSlider.addEventListener("input", () => {
                radiusValue.textContent = radiusSlider.value;
                drawRoundedImage(parseInt(radiusSlider.value));
            });

            downloadBtn.addEventListener("click", () => {
                const link = document.createElement("a");
                link.download = originalFileName + "-rounded.png";
                link.href = canvas.toDataURL();
                link.click();
            });
            
            const fileName = document.getElementById("fileName");

            upload.addEventListener("change", () => {
                if (upload.files.length > 0) {
                    fileName.textContent = upload.files[0].name;
                } else {
                    fileName.textContent = "Kein Bild ausgewählt";
                }
            });
        </script>
    </body>
</html>
